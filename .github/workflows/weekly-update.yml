name: Weekly BD Report Update

on:
  schedule:
    # PRIMARY: Tuesday 09:00 Manila (01:00 UTC). GitHub may delay scheduled
    # workflows during high load — this is the canonical slot.
    - cron: '0 1 * * 2'
    # BACKUP: Tuesday 12:00 Manila (04:00 UTC). Safety net if the 01:00 slot
    # is skipped or queued. The commit step is a no-op when data hasn't
    # changed, so a successful primary makes this idempotent.
    - cron: '0 4 * * 2'
  # Manual trigger — click "Run workflow" in GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run weekly report updater
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python update_weekly_report.py

      - name: Commit & push updated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bd-weekly-report.html
          git diff --staged --quiet || git commit -m "chore: weekly report update $(date -u +'%Y-%m-%d')"
          git push
